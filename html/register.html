<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

     <link rel="shortcut icon" href="/img/icon/ChumChatLogotyp.ico" type="image/x-icon">
     <link rel="stylesheet" href="../style/login.css" />
    <link rel="stylesheet" href="../style/style.css" />
    <title>Chumchat|Register</title>
  </head>
  

  <body>
     <nav>
       <a href="../index.html"><img src="../img/ChumChatLogotyp.png" class="logo" alt="loga för Chumchat"></a> 
        <div class="hamburger" id="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
  
        <ul class="menu">
             <button id="darkmodeButton">Toggle Dark Mode</button>
             <li href="#about">ROM1</a>
            <li href="#services">MEMES</a>
            <li id="user-area"><a href="html/register.html"></a></li>
        </ul>
    </nav>

    <div class="container">
      <div class="register-card">
        <div class="header">
          <h1>REGISTER</h1>
        </div>

        <form class="form-body">
          <div class="input-group">
            <span class="icon">👤</span>
            <input type="text" name="email" placeholder="EMAIL" class="inputDesign" required id="register-username"/>
          </div>

          <div class="input-group">
            <span class="icon">👤</span>
            <input type="text" name="username" placeholder="USERNAME" class="inputDesign" required id="register-username"/>
          </div>

          <div class="input-group">
            <span class="icon">🔒</span>
            <input type="password" name="password" placeholder="PASSWORD" class="inputDesign" required id="register-password"/>
          </div>

          <div>
            
           <label for="image-url" class="placeHolderImg">Picture link</label>
            <input type="url" name="pfp-url" placeholder="Enter image link" class="register-image"  required>
          </div>

          <button type="submit" class="login-btn" id="register-button">REGISTER ME</button>
        </form>
        <a href="/html/login.html" class="accountalready">Alreday have account?</a>
      </div>
    </div>
     <footer class="footer">
        <ul>
            <li><a href="">About</a></li>
            <li><a href="">Contact</a></li>
        </ul>
    </footer>
    <script type="module" src="../javascript/Auth/registerUser.js"></script>
    <script type="module" src="../javascript/function/hamburgermeny.js"></script>
  </body>
