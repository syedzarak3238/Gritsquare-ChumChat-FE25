<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <link rel="shortcut icon" href="img/icon/ChumChatLogotyp.ico" type="image/x-icon">
    <title>Chumchat|Register</title>
  </head>
  <link rel="stylesheet" href="/style/login.css" />
  <link rel="stylesheet" href="/style/style.css" />

  <body>
    <nav>
     <a href="../index.html"><img src="/img/ChumChatLogotyp.png" class="logo" alt="loga för Chumchat"></a> 
      <ul class="menu">
        <li><a href="#">Register/Logga in</a></li>
      </ul>
    </nav>

    <div class="container">
      <div class="register-card">
        <div class="header">
          <h1>REGISTER</h1>
        </div>

        <form class="form-body">
          <div class="input-group">
            <span class="icon">👤</span>
            <input type="text" placeholder="USERNAME" class="inputDesign" required id="register-username"/>
          </div>

          <div class="input-group">
            <span class="icon">🔒</span>
            <input type="password" placeholder="PASSWORD" class="inputDesign" required id="register-password"/>
          </div>

          <button type="submit" class="login-btn" id="register-button">REGISTER ME</button>
        </form>
        <a href="/html/login.html" class="accountalready">Alreday have account?</a>
      </div>
    </div>
     <footer class="footer">
        <ul>
            <li><a href="">About</a></li>
            <li><a href="">Contact</a></li>
        </ul>
    </footer>
  </body>
</html>
